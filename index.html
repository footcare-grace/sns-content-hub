<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIRAL TURN｜SNS運営 本社ロビー</title>
<style>
:root{
  --ink:#33322a;--sub:#8a8676;--line:#eee7d6;--bg:#fdf9ee;--card:#fff;
  --tab1:#2f9e7a;--tab2:#3a7fd0;--tab3:#e08a5c;--tab4:#3a6fc7;--tab5:#3a4a7a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;background:var(--bg);color:var(--ink)}
header{background:linear-gradient(135deg,#fff6df,#eaf6ef);border-bottom:1px solid var(--line);padding:18px 24px;display:flex;align-items:center;gap:14px}
header canvas{width:44px;height:44px;border-radius:12px;background:#fff;box-shadow:0 2px 6px rgba(150,130,80,.12)}
header h1{font-size:18px;font-weight:800;color:#2f9e7a}
header p{font-size:12px;color:var(--sub);margin-top:2px}

.tabs{display:flex;gap:8px;padding:14px 20px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--line)}
.tab{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 9px;border:1.5px solid var(--line);border-radius:999px;background:#fff;cursor:pointer;white-space:nowrap;font-size:13.5px;font-weight:700;color:var(--sub);transition:.15s}
.tab canvas{width:34px;height:34px;border-radius:50%;background:#f4f1e4;flex:none}
.tab.on{border-color:var(--tc);color:var(--tc);background:color-mix(in srgb, var(--tc) 8%, #fff)}
.tab:hover{border-color:var(--tc)}

.stage{max-width:1320px;margin:0 auto;padding:16px}
.room{display:none}
.room.on{display:block}
.frame-wrap{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 4px 18px rgba(150,130,80,.08)}
.frame-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#faf6ea;border-bottom:1px solid var(--line);font-size:12px;color:var(--sub)}
.dot{width:8px;height:8px;border-radius:50%}
iframe{width:100%;height:82vh;border:none;display:block;background:#fff}
.lobby-note{font-size:12px;color:var(--sub);text-align:center;padding:10px 0 0}
</style>
</head>
<body>
<header>
  <canvas id="mascot-lobby" width="88" height="88"></canvas>
  <div>
    <h1>SPIRAL TURN SNS運営 本社ロビー</h1>
    <p>部署を選んで、それぞれのプロンプト生成ハブへ（ここではロジックの変更は一切行っていません／表示だけをまとめています）</p>
  </div>
</header>

<div class="tabs" id="tabs">
  <button class="tab on" data-room="threads" data-tc="#2f9e7a" style="--tc:#2f9e7a"><canvas id="tab-threads" width="68" height="68"></canvas>Threads運営チーム</button>
  <button class="tab" data-room="note" data-tc="#3a7fd0" style="--tc:#3a7fd0"><canvas id="tab-note" width="68" height="68"></canvas>Note運用チーム</button>
  <button class="tab" data-room="seminar" data-tc="#e08a5c" style="--tc:#e08a5c"><canvas id="tab-seminar" width="68" height="68"></canvas>セミナー集客</button>
  <button class="tab" data-room="company" data-tc="#3a6fc7" style="--tc:#3a6fc7"><canvas id="tab-company" width="68" height="68"></canvas>会社・取扱店</button>
  <button class="tab" data-room="thumb" data-tc="#3a4a7a" style="--tc:#3a4a7a"><canvas id="tab-thumb" width="68" height="68"></canvas>サムネイルメーカー</button>
</div>

<div class="stage">
  <div class="room on" id="room-threads">
    <div class="frame-wrap">
      <div class="frame-bar"><span class="dot" style="background:#2f9e7a"></span>Threads運営チームハブ（6役割）</div>
      <iframe src="threads.html" title="Threads運営チームハブ"></iframe>
    </div>
  </div>
  <div class="room" id="room-note">
    <div class="frame-wrap">
      <div class="frame-bar"><span class="dot" style="background:#3a7fd0"></span>Note運用チームハブ（5役割）</div>
      <iframe src="note.html" title="Note運用チームハブ"></iframe>
    </div>
  </div>
  <div class="room" id="room-seminar">
    <div class="frame-wrap">
      <div class="frame-bar"><span class="dot" style="background:#e08a5c"></span>セミナー集客ハブ（JBM×月一セミナー）</div>
      <iframe src="seminar.html" title="セミナー集客ハブ"></iframe>
    </div>
  </div>
  <div class="room" id="room-company">
    <div class="frame-wrap">
      <div class="frame-bar"><span class="dot" style="background:#3a6fc7"></span>会社・取扱店アカウント運用ハブ</div>
      <iframe src="company.html" title="会社・取扱店アカウント運用ハブ"></iframe>
    </div>
  </div>
  <div class="room" id="room-thumb">
    <div class="frame-wrap">
      <div class="frame-bar"><span class="dot" style="background:#3a4a7a"></span>Noteサムネイルメーカー</div>
      <iframe src="note-thumb.html" title="Noteサムネイルメーカー"></iframe>
    </div>
  </div>
  <p class="lobby-note">各部署のデータ・ログイン情報等はそれぞれのページ内（ブラウザのlocalStorage）に保存され、部署ごとに独立しています。</p>
</div>

<script src="mascot.js"></script>
<script>
  drawMascot("mascot-lobby","typing","#2f9e7a");
  drawMascot("tab-threads","phone","#2f9e7a");
  drawMascot("tab-note","writing","#3a7fd0");
  drawMascot("tab-seminar","camera","#e08a5c");
  drawMascot("tab-company","camera","#3a6fc7");
  drawMascot("tab-thumb","drawing","#3a4a7a");

  document.querySelectorAll(".tab").forEach(b=>{
    b.addEventListener("click",()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
      document.querySelectorAll(".room").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      document.getElementById("room-"+b.dataset.room).classList.add("on");
    });
  });
</script>
</body>
</html>
