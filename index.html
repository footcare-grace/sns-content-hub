<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIRAL TURN｜SNS運営 本社ロビー</title>
<style>
:root{
  --ink:#33322a;--sub:#8a8676;--line:#eee7d6;--bg:#fdf9ee;--card:#fff;
  --tab1:#2f9e7a;--tab2:#3a7fd0;--tab3:#e08a5c;--tab4:#3a6fc7;--tab5:#3a4a7a;--tab6:#a8792f;
  --ok:#2f9e7a;--ok-soft:#e6f5ef;--danger:#c0553c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI",Meiryo,sans-serif;background:var(--bg);color:var(--ink)}
header{background:linear-gradient(135deg,#fff6df,#eaf6ef);border-bottom:1px solid var(--line);padding:18px 24px;display:flex;align-items:center;gap:14px}
header canvas{width:44px;height:44px;border-radius:12px;background:#fff;box-shadow:0 2px 6px rgba(150,130,80,.12)}
header h1{font-size:18px;font-weight:800;color:#2f9e7a}
header p{font-size:12px;color:var(--sub);margin-top:2px}

.tabs{display:flex;gap:8px;padding:14px 20px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--line)}
.tab{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 9px;border:1.5px solid var(--line);border-radius:999px;background:#fff;cursor:pointer;white-space:nowrap;font-size:13.5px;font-weight:700;color:var(--sub);transition:.15s}
.tab canvas{width:34px;height:34px;border-radius:50%;background:#f4f1e4;flex:none}
.tab.on{border-color:var(--tc);color:var(--tc);background:color-mix(in srgb, var(--tc) 8%, #fff)}
.tab:hover{border-color:var(--tc)}

.stage{max-width:1320px;margin:0 auto;padding:16px}
.room{display:none}
.room.on{display:block}
.frame-wrap{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 4px 18px rgba(150,130,80,.08)}
.frame-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#faf6ea;border-bottom:1px solid var(--line);font-size:12px;color:var(--sub)}
.dot{width:8px;height:8px;border-radius:50%}
iframe{width:100%;height:82vh;border:none;display:block;background:#fff}
.lobby-note{font-size:12px;color:var(--sub);text-align:center;padding:10px 0 0}

/* ===== 社長業務タブ ===== */
.ceo-body{padding:22px 26px 30px}
.ceo-add{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;background:#faf6ea;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:20px}
.ceo-field{display:flex;flex-direction:column;gap:4px}
.ceo-field label{font-size:11px;color:var(--sub);font-weight:700}
.ceo-field input,.ceo-field select{border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13.5px;font-family:inherit;background:#fff;color:var(--ink)}
.ceo-field.title{flex:1;min-width:160px}
.ceo-add-btn{background:var(--tab6);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;height:37px}
.ceo-add-btn:hover{background:#8f6624}

.ceo-view-toggle{display:flex;gap:6px;margin-bottom:16px}
.ceo-view-toggle button{border:1.5px solid var(--line);background:#fff;color:var(--sub);border-radius:999px;padding:7px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.ceo-view-toggle button.on{border-color:var(--tab6);color:#fff;background:var(--tab6)}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
@media(max-width:820px){.week-grid{grid-template-columns:1fr;}}
.day-col{border:1px solid var(--line);border-radius:10px;min-height:110px;background:#fffdf7}
.day-col.today{border-color:var(--tab6);box-shadow:0 0 0 2px rgba(168,121,47,.15)}
.day-head{font-size:11.5px;font-weight:700;color:var(--sub);padding:7px 9px;border-bottom:1px dashed var(--line);display:flex;justify-content:space-between}
.day-col.today .day-head{color:var(--tab6)}
.day-tasks{padding:6px 7px;display:flex;flex-direction:column;gap:6px}

.month-list{display:flex;flex-direction:column;gap:8px}
.month-date-head{font-size:12px;font-weight:700;color:var(--sub);margin-top:10px;padding-bottom:3px;border-bottom:1px dashed var(--line)}

.task-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:6px 9px;font-size:12.5px}
.task-row canvas{width:26px;height:26px;flex:none;border-radius:50%;background:#f4f1e4}
.task-row .t-hub-select{flex:none;font-size:10px;font-weight:700;background:#f4f1e4;padding:2px 4px;border-radius:6px;white-space:nowrap;border:none;font-family:inherit;cursor:pointer;max-width:88px}
.task-row .t-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-row.done{opacity:.5}
.task-row.done .t-title{text-decoration:line-through}
.task-row .t-check{flex:none;width:22px;height:22px;border-radius:50%;border:2px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;position:relative}
.task-row .t-check:hover{border-color:var(--ok)}
.task-row.done .t-check{background:var(--ok);border-color:var(--ok)}
.task-row .t-del{flex:none;background:none;border:none;color:var(--danger);font-size:14px;cursor:pointer;opacity:.5;padding:2px 4px}
.task-row .t-del:hover{opacity:1}
.overdue{color:var(--danger);font-weight:700}
.empty-day{font-size:11px;color:#c9c2ac;padding:4px 2px}
.star-pop{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:14px;color:#f2b134;opacity:0;pointer-events:none}
@keyframes starPop{0%{opacity:0;transform:translate(-50%,4px) scale(.4);}40%{opacity:1;transform:translate(-50%,-10px) scale(1.3);}100%{opacity:0;transform:translate(-50%,-22px) scale(.8);}}
.star-pop.go{animation:starPop .7s ease-out;}
.ceo-empty{font-size:13px;color:var(--sub);text-align:center;padding:30px 10px}

/* ===== 今月の実績サマリー ===== */
.stats-card{background:linear-gradient(135deg,#fff9ea,#fff);border:1.5px solid #ecdfb8;border-radius:12px;padding:16px 18px;margin-bottom:18px}
.stats-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
.stats-head h4{font-size:13.5px;font-weight:800;color:var(--tab6)}
.stats-total{font-size:12px;color:var(--sub)}
.stats-total b{font-size:19px;color:var(--tab6);margin-right:2px}
.stats-bars{display:flex;flex-direction:column;gap:7px}
.stats-row{display:flex;align-items:center;gap:8px}
.stats-row .s-mascot{width:22px;height:22px;flex:none;border-radius:50%;background:#f4f1e4}
.stats-row .s-label{font-size:11.5px;font-weight:700;width:76px;flex:none;color:var(--ink)}
.stats-row .s-bar-wrap{flex:1;background:#f1ecdb;border-radius:5px;height:14px;overflow:hidden}
.stats-row .s-bar{height:100%;border-radius:5px;transition:width .4s ease}
.stats-row .s-count{font-size:11px;font-weight:700;width:26px;text-align:right;flex:none;color:var(--sub)}
.stats-empty{font-size:11.5px;color:var(--sub);text-align:center;padding:6px 0}

/* ===== 月間カレンダー ===== */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-weekday{font-size:11px;font-weight:700;color:var(--sub);text-align:center;padding:4px 0}
.cal-cell{border:1px solid var(--line);border-radius:9px;min-height:88px;background:#fffdf7;padding:5px 6px;display:flex;flex-direction:column;gap:3px}
.cal-cell.other-month{background:#f7f4ea;opacity:.45}
.cal-cell.today{border-color:var(--tab6);box-shadow:0 0 0 2px rgba(168,121,47,.15)}
.cal-cell-head{display:flex;justify-content:space-between;align-items:center}
.cal-daynum{font-size:11.5px;font-weight:700;color:var(--ink)}
.cal-cell.today .cal-daynum{color:var(--tab6)}
.cal-add-btn{width:17px;height:17px;border-radius:50%;border:1.3px solid var(--line);background:#fff;color:var(--sub);font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.cal-add-btn:hover{border-color:var(--tab6);color:var(--tab6)}
.cal-tasks{display:flex;flex-direction:column;gap:2px;overflow:hidden}
.cal-chip{display:flex;align-items:center;gap:3px;font-size:9.5px;padding:1.5px 4px;border-radius:5px;background:#f4f1e4;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-chip.done{opacity:.5;text-decoration:line-through}
.cal-chip .dot{width:6px;height:6px;border-radius:50%;flex:none}
.cal-chip .check-mark{flex:none;font-size:9px}
@media(max-width:820px){.cal-cell{min-height:66px}.cal-chip{font-size:8.5px}}
</style>
</head>
<body>
<header>
  <canvas id="mascot-lobby" width="88" height="88"></canvas>
  <div>
    <h1>SPIRAL TURN SNS運営 本社ロビー</h1>
    <p>部署を選んで、それぞれのプロンプト生成ハブへ（ここではロジックの変更は一切行っていません／表示だけをまとめています）</p>
  </div>
</header>

<div class="tabs" id="tabs">
  <button class="tab on" data-room="threads" data-tc="#2f9e7a" style="--tc:#2f9e7a"><canvas id="tab-threads" width="68" height="68"></canvas>Threads運営チーム</button>
  <button class="tab" data-room="note" data-tc="#3a7fd0" style="--tc:#3a7fd0"><canvas id="tab-note" width="68" height="68"></canvas>Note運用チーム</button>
  <button class="tab" data-room="seminar" data-tc="#e08a5c" style="--tc:#e08a5c"><canvas id="tab-seminar" width="68" height="68"></canvas>セミナー集客</button>
  <button class="tab" data-room="company" data-tc="#3a6fc7" style="--tc:#3a6fc7"><canvas id="tab-company" width="68" height="68"></canvas>会社・取扱店</button>
  <button class="tab" data-room="thumb" data-tc="#3a4a7a" style="--tc:#3a4a7a"><canvas id="tab-thumb" width="68" height="68"></canvas>サムネイルメーカー</button>
  <button class="tab" data-room="ceo" data-tc="#a8792f" style="--tc:#a8792f"><canvas id="tab-ceo" width="68" height="68"></canvas>社長業務</button>
</div>

<div class="stage">
  <div class="room on" id="room-threads">
    <div class="frame-wrap">
      <div class="frame-bar"><span class="dot" style="background:#2f9e7a"></span>Threads運営チームハブ（6役割）</div>
      <iframe src="threads.html" title="Threads運営チームハブ"></iframe>
    </div>
  </div>
  <div class="room" id="room-note">
    <div class="frame-wrap">
      <div class="frame-bar"><span class="dot" style="background:#3a7fd0"></span>Note運用チームハブ（5役割）</div>
      <iframe src="note.html" title="Note運用チームハブ"></iframe>
    </div>
  </div>
  <div class="room" id="room-seminar">
    <div class="frame-wrap">
      <div class="frame-bar"><span class="dot" style="background:#e08a5c"></span>セミナー集客ハブ（JBM×月一セミナー）</div>
      <iframe src="seminar.html" title="セミナー集客ハブ"></iframe>
    </div>
  </div>
  <div class="room" id="room-company">
    <div class="frame-wrap">
      <div class="frame-bar"><span class="dot" style="background:#3a6fc7"></span>会社・取扱店アカウント運用ハブ</div>
      <iframe src="company.html" title="会社・取扱店アカウント運用ハブ"></iframe>
    </div>
  </div>
  <div class="room" id="room-thumb">
    <div class="frame-wrap">
      <div class="frame-bar"><span class="dot" style="background:#3a4a7a"></span>Noteサムネイルメーカー</div>
      <iframe src="note-thumb.html" title="Noteサムネイルメーカー"></iframe>
    </div>
  </div>

  <!-- ============ 社長業務（新規・iframeではなくこのページ内で完結） ============ -->
  <div class="room" id="room-ceo">
    <div class="frame-wrap">
      <div class="frame-bar"><span class="dot" style="background:#a8792f"></span>社長業務：週間・月間スケジュール</div>
      <div class="ceo-body">
        <div class="ceo-add">
          <div class="ceo-field title">
            <label>やること</label>
            <input type="text" id="ceo-title" placeholder="例：WALKのInstagram投稿を作る" maxlength="40">
          </div>
          <div class="ceo-field">
            <label>日付</label>
            <input type="date" id="ceo-date">
          </div>
          <div class="ceo-field">
            <label>担当部署</label>
            <select id="ceo-type">
              <option value="" selected disabled>選んでください</option>
              <option value="threads">Threads</option>
              <option value="note">Note</option>
              <option value="seminar">セミナー集客</option>
              <option value="company">会社・取扱店</option>
              <option value="thumb">サムネイル</option>
              <option value="other">その他</option>
            </select>
          </div>
          <button class="ceo-add-btn" id="ceo-add-btn">＋ 追加する</button>
        </div>

        <div class="ceo-view-toggle">
          <button class="on" data-view="week" id="ceo-view-week">週間スケジュール</button>
          <button data-view="month" id="ceo-view-month">月間スケジュール</button>
        </div>

        <div id="ceo-view-area"></div>
      </div>
    </div>
  </div>

  <p class="lobby-note">各部署のデータ・ログイン情報等はそれぞれのページ内（ブラウザのlocalStorage）に保存され、部署ごとに独立しています。</p>
</div>

<script src="mascot.js"></script>
<script src="ceo_tasks.js"></script>
<script>
  drawMascot("mascot-lobby","typing","#2f9e7a");
  drawMascot("tab-threads","phone","#2f9e7a");
  drawMascot("tab-note","writing","#3a7fd0");
  drawMascot("tab-seminar","camera","#e08a5c");
  drawMascot("tab-company","camera","#3a6fc7");
  drawMascot("tab-thumb","drawing","#3a4a7a");
  drawMascot("tab-ceo","writing","#a8792f");

  document.querySelectorAll(".tab").forEach(b=>{
    b.addEventListener("click",()=>{
      document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on"));
      document.querySelectorAll(".room").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      document.getElementById("room-"+b.dataset.room).classList.add("on");
      if(b.dataset.room==="ceo"&&window.renderCeoTasks)window.renderCeoTasks();
    });
  });
</script>
</body>
</html>
